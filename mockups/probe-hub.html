<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{font-family:monospace;background:#fff;margin:0;padding:14px;font-size:14px}
.row{padding:5px 8px;border-bottom:1px solid #eee}
iframe{width:390px;height:600px;border:0;position:absolute;left:-9999px}
</style></head><body><div id="out"></div>
<script>
var f=document.createElement('iframe'); f.src='../saglik-hub-v1.html';
f.onload=function(){ setTimeout(function(){
  var d=f.contentDocument, out=document.getElementById('out'), all=d.body.querySelectorAll('*'), hits=[];
  all.forEach(function(el){
    if(el.closest('.drawer')||el.closest('.bottom-nav')||el.closest('.feedback-tab')||el.closest('.cookie-banner')||el.closest('.fb-modal')||el.closest('.fb-overlay'))return;
    var r=el.getBoundingClientRect();
    if(r.right>391){
      hits.push({t:el.tagName.toLowerCase(),c:(el.className&&el.className.toString().slice(0,40)),w:Math.round(r.width),right:Math.round(r.right)});
    }
  });
  hits.sort(function(a,b){return b.right-a.right;});
  hits.slice(0,16).forEach(function(h){
    var div=document.createElement('div'); div.className='row';
    div.textContent=h.right+'px right · w'+h.w+' · '+h.t+'.'+h.c; out.appendChild(div);
  });
  if(!hits.length){document.getElementById('out').textContent='temiz';}
},900); };
document.body.appendChild(f);
</script></body></html>
