<style>
@font-face{
  font-family:"Gilroy";
  src:url("assets/fonts/Gilroy-Medium.ttf") format("truetype");
  font-weight:500; font-style:normal; font-display:swap;
}
:root{
  --tomato:#E14827; --slate:#211E16; --muted:#7E7E7E; --line:#ECECEC;
  --green:#3BB77E; --green-deep:#2c9963; --bg:#f9f9f9; --paper:#ffffff;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:24px;
  --sh-md:0 6px 22px rgba(33,30,22,.09);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Gilroy",system-ui,sans-serif;font-weight:500;color:var(--slate);
  background:var(--bg);min-height:100vh;display:grid;place-items:center;padding:24px;
  -webkit-font-smoothing:antialiased;
}
.alias-card{
  width:min(480px,100%);background:var(--paper);border:1px solid var(--line);
  border-radius:var(--radius-xl);box-shadow:var(--sh-md);padding:40px 36px;text-align:center;
}
.alias-card img{height:42px;width:auto;margin:0 auto 26px;display:block}
.alias-ico{
  width:64px;height:64px;border-radius:var(--radius-lg);background:#EAF7F0;color:var(--green-deep);
  display:grid;place-items:center;font-size:26px;margin:0 auto 18px;
}
.alias-card h1{font-size:21px;font-weight:700;letter-spacing:-.01em;line-height:1.25;margin-bottom:9px}
.alias-card p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.alias-go{
  display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:14.5px;color:#fff;
  background:var(--green);padding:14px 26px;border-radius:var(--radius-md);text-decoration:none;
  transition:.25s var(--ease);
}
.alias-go:hover{background:var(--green-deep);transform:translateY(-2px)}
.alias-list{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
.alias-list a{
  font-size:12.5px;font-weight:700;color:var(--slate);text-decoration:none;
  background:var(--bg);border:1px solid var(--line);padding:8px 13px;border-radius:var(--radius-sm);
  transition:.2s var(--ease);
}
.alias-list a:hover{border-color:var(--green);color:var(--green-deep)}
.alias-bar{height:4px;background:var(--line);border-radius:var(--radius-sm);overflow:hidden;margin-top:24px}
.alias-bar i{display:block;height:100%;width:0;background:var(--green);animation:fill 1.2s linear forwards}
@keyframes fill{to{width:100%}}
</style>
</head>
<body>
<main class="alias-card">
  <img src="assets/img/logo-official.png" alt="DadaMutfak" />
  <span class="alias-ico"><i style="font-style:normal">→</i></span>
  <h1>Hesaplayıcılar ayrı sayfalara taşındı</h1>
  <p>Bu adres artık kullanılmıyor. Beden Kütle Endeksi hesaplayıcısına yönlendiriliyorsun; dilersen aşağıdan başka bir hesaplayıcıya geç.</p>
  <a class="alias-go" href="beden-kutle-endeksi-v1.html">BKİ Hesaplayıcıya Git</a>
  <nav class="alias-list" aria-label="Hesaplayıcılar">
    <a href="bazal-metabolizma-v1.html">Bazal Metabolizma</a>
    <a href="gunluk-kalori-v1.html">Günlük Kalori</a>
    <a href="vucut-tipi-v1.html">Vücut Tipi</a>
    <a href="gunluk-su-v1.html">Günlük Su</a>
    <a href="ideal-kilo-v1.html">İdeal Kilo</a>
    <a href="saglik-hub-v1.html">Sağlık Merkezi</a>
  </nav>
  <div class="alias-bar" aria-hidden="true"><i></i></div>
</main>
</body>
</html>
