<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0}
  #frm{width:390px;height:1400px;border:0;display:block}
  #out{font:13px monospace;padding:8px;white-space:pre-wrap}
</style></head><body>
<div id="out">PENDING</div>
<iframe id="frm"></iframe>
<script>
  var page = location.hash.slice(1) || 'mutfak-sirlari-v1.html';
  var f = document.getElementById('frm');
  f.src = page;
  f.addEventListener('load', function(){
    try{
      var d = f.contentDocument, W = 390, off = [];
      var all = d.querySelectorAll('body *');
      all.forEach(function(el){
        var r = el.getBoundingClientRect();
        // ignore zero-size / off-screen-left intentional, and elements wider only via scroll containers
        if (r.width > 0 && r.right > W + 1){
          var st = f.contentWindow.getComputedStyle(el);
          // skip elements inside an intentional horizontal scroller
          var p = el.parentElement, clipped=false;
          while(p){ var ps=f.contentWindow.getComputedStyle(p);
            if(ps.overflowX==='auto'||ps.overflowX==='scroll'||ps.overflowX==='hidden'||ps.overflowX==='clip'){clipped=true;break;} p=p.parentElement; }
          if(!clipped){
            off.push((el.tagName+'.'+(el.className&&el.className.toString?el.className.toString().split(' ')[0]:'')).slice(0,40)+'@'+Math.round(r.right));
          }
        }
      });
      var docW = d.documentElement.scrollWidth;
      document.getElementById('out').textContent =
        'PAGE='+page+' VIEWPORT=390 docScrollW='+docW+
        ' UNCLIPPED_OVERFLOW='+off.length+' :: '+ (off.slice(0,15).join(' | ')||'NONE');
    }catch(e){ document.getElementById('out').textContent='ERR '+e; }
  });
</script>
</body></html>
