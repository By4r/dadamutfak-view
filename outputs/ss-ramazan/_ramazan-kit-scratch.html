<!-- ============================================================
     RAMAZAN MODU — UYGULAMA KİTİ (scratch, gate sonrası 5 sayfaya gömülür)
     Sözleşme: ?ramazan=1/0 + localStorage dm_ramazan ('1'/'0'/'dismissed') + body.is-ramazan
     Yer: fixed top:112 (mobil 62) mode-bar + gated .below-header offset bump
     ============================================================ -->

<!-- ===================== 1) CSS (sayfa <style> sonuna) ===================== -->
<style id="rmz-css">
/* === RAMAZAN MODU — gated; mod kapalıyken HİÇBİR kural devreye girmez === */
.rmz-bar{display:none;position:fixed;top:112px;left:0;right:0;z-index:55;
  background:linear-gradient(100deg,#1d1a12,#2a2418 55%,#3a2f17);
  color:#f3ead7;border-bottom:1px solid rgba(250,192,69,.28);
  box-shadow:0 6px 22px rgba(33,30,22,.18)}
.rmz-bar .wrap{display:flex;align-items:center;gap:16px;min-height:46px;padding-top:7px;padding-bottom:7px}
/* aktif sayaç durumu */
body.is-ramazan .rmz-bar.rmz-live{display:block}
body.rmz-ask .rmz-bar.rmz-invite{display:block}
/* offset bump — mod/banner açıkken ilk section header altına ek nefes (bar yüksekliği) */
body.is-ramazan .below-header,body.rmz-ask .below-header{padding-top:160px}

.rmz-badge{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13px;
  letter-spacing:.2px;color:#fac045;white-space:nowrap}
.rmz-badge i{font-size:14px}
.rmz-live-main{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.rmz-target{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:#e7dcc4}
.rmz-target i{color:#fac045}
.rmz-count{font-weight:800;font-variant-numeric:tabular-nums;font-size:16px;color:#fff;
  letter-spacing:.5px;background:rgba(250,192,69,.12);border:1px solid rgba(250,192,69,.22);
  padding:3px 11px;border-radius:var(--radius-sm)}
.rmz-date{font-size:12px;color:#b9ad96;white-space:nowrap}
.rmz-tools{display:flex;align-items:center;gap:8px;margin-left:auto}
.rmz-link{font-size:12.5px;color:#e7dcc4;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:var(--radius-sm);border:1px solid rgba(250,192,69,.22);transition:.2s var(--ease)}
.rmz-link:hover{background:rgba(250,192,69,.14);color:#fff}
.rmz-exit{background:transparent;border:0;color:#b9ad96;font-size:12.5px;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:var(--radius-sm)}
.rmz-exit:hover{color:#fac045}
/* davet bannerı durumu */
.rmz-invite .rmz-inv-tx{flex:1;min-width:0;font-size:13.5px;color:#f3ead7;display:flex;align-items:center;gap:9px}
.rmz-invite .rmz-inv-tx b{color:#fac045;font-weight:800}
.rmz-inv-yes{background:#fac045;color:#241d0c;border:0;font-weight:800;font-size:12.5px;cursor:pointer;
  padding:7px 16px;border-radius:var(--radius-sm);white-space:nowrap;transition:.2s var(--ease)}
.rmz-inv-yes:hover{background:#ffcf63}
.rmz-inv-no{background:transparent;border:0;color:#b9ad96;font-size:12.5px;cursor:pointer;padding:7px 10px}
.rmz-inv-no:hover{color:#f3ead7}
@media (max-width:640px){
  .rmz-bar{top:62px}
  body.is-ramazan .below-header,body.rmz-ask .below-header{padding-top:108px}
  .rmz-bar .wrap{gap:9px;min-height:42px;flex-wrap:nowrap;overflow:hidden}
  .rmz-date,.rmz-link span,.rmz-badge span{display:none}      /* kompakt: ikon+sayaç kalır */
  .rmz-live-main{gap:9px}
  .rmz-target{font-size:12px}
  .rmz-count{font-size:14px;padding:2px 8px}
  .rmz-inv-tx{font-size:12px}.rmz-inv-tx b{display:inline}
  .rmz-inv-yes{padding:6px 11px;font-size:12px}
}
</style>

<!-- ===================== 2) MARKUP (page-main İLK çocuğu / header sonrası) ===================== -->
<!-- aktif mod sayaç barı -->
<div class="rmz-bar rmz-live" role="status" aria-label="Ramazan modu — vakit sayacı">
  <div class="wrap">
    <span class="rmz-badge"><i class="fa-solid fa-moon"></i><span>Ramazan Modu</span></span>
    <div class="rmz-live-main">
      <span class="rmz-target"><i id="rmzIco" class="fa-solid fa-utensils"></i><b id="rmzLbl">İftara</b></span>
      <span class="rmz-count" id="rmzCount">00:00:00</span>
      <span class="rmz-date" id="rmzDate">16 Ramazan 1447 · İstanbul</span>
    </div>
    <div class="rmz-tools">
      <a class="rmz-link" href="sezon-v1.html"><i class="fa-solid fa-bowl-food"></i><span>Ramazan Mutfağı</span></a>
      <button class="rmz-exit" type="button" id="rmzExit"><i class="fa-solid fa-xmark"></i> Çık</button>
    </div>
  </div>
</div>
<!-- öneri davet bannerı (localStorage boşken) -->
<div class="rmz-bar rmz-invite" role="region" aria-label="Ramazan modu önerisi">
  <div class="wrap">
    <span class="rmz-inv-tx"><i class="fa-solid fa-moon" style="color:#fac045"></i>
      <span><b>Ramazan geldi.</b> Sofranı DadaMutfak'la kur — iftar–sahur sayacı, menüler ve tarifler tek modda.</span></span>
    <button class="rmz-inv-yes" type="button" id="rmzYes">Ramazan Modu'nu Aç</button>
    <button class="rmz-inv-no" type="button" id="rmzNo">Belki sonra</button>
  </div>
</div>

<!-- ===================== 3) JS (sayfa scriptlerinin sonuna) ===================== -->
<script id="rmz-js">
(function(){
  // --- sözleşme: ?ramazan=1/0 + localStorage dm_ramazan + body.is-ramazan (Faz 2 auth ikizi) ---
  var qs = location.search, KEY='dm_ramazan';
  function set(v){try{localStorage.setItem(KEY,v);}catch(e){}}
  function get(){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  if(qs.indexOf('ramazan=1')>-1) set('1');
  else if(qs.indexOf('ramazan=0')>-1) set('0');
  var st = get();
  var active = st==='1';
  if(active) document.body.classList.add('is-ramazan');
  // davet: hiç karar verilmemişse (boş) ve mod kapalıysa sor
  else if(st===null) document.body.classList.add('rmz-ask');

  // --- davet butonları ---
  var yes=document.getElementById('rmzYes'), no=document.getElementById('rmzNo');
  if(yes) yes.onclick=function(){ set('1'); location.search='?ramazan=1'; };
  if(no)  no.onclick =function(){ set('dismissed'); document.body.classList.remove('rmz-ask'); };
  var exit=document.getElementById('rmzExit');
  if(exit) exit.onclick=function(){ set('0'); location.search='?ramazan=0'; };

  // --- otomatik geçişli iftar↔sahur sayacı (çalışır JS) ---
  // mock vakitler: İftar 20:31, İmsak/Sahur 03:42 (sezon-v1 ile hizalı)
  var IFTAR={h:20,m:31}, IMSAK={h:3,m:42};
  var cnt=document.getElementById('rmzCount'), lbl=document.getElementById('rmzLbl'), ico=document.getElementById('rmzIco');
  function pad(n){return (n<10?'0':'')+n;}
  function at(base,t){var d=new Date(base);d.setHours(t.h,t.m,0,0);return d;}

  // ?demo=1 → hızlandırılmış sanal saat: ~7sn iftara, flip, ~7sn sahura, flip... (patron canlı görür)
  var demo = qs.indexOf('demo=1')>-1, demoStart=Date.now(), DEMOSEG=7000;
  function tick(){
    if(!cnt) return;
    var now, iftarT, imsakNext, imsakPrev, mode, target;
    if(demo){
      // sanal döngü: segment 0 → İftara (7sn), segment 1 → Sahura (7sn), tekrarla
      var el=(Date.now()-demoStart)%(DEMOSEG*2);
      if(el<DEMOSEG){ mode='iftar'; var rem=Math.ceil((DEMOSEG-el)/1000); var s=rem; }
      else{ mode='sahur'; var rem2=Math.ceil((DEMOSEG*2-el)/1000); var s=rem2; }
      var hh=0,mm=Math.floor(s/60),ss=s%60;
      cnt.textContent=pad(hh)+':'+pad(mm)+':'+pad(ss);
    } else {
      now=new Date();
      var iftar=at(now,IFTAR), imsak=at(now,IMSAK);
      // faz: imsak..iftar arası → İftara; aksi (iftar sonrası gece) → Sahura
      if(now>=imsak && now<iftar){ mode='iftar'; target=iftar; }
      else { mode='sahur'; var imN=at(now,IMSAK); if(now>=iftar) imN.setDate(imN.getDate()+1); target=imN; }
      var diff=Math.max(0,Math.floor((target-now)/1000));
      cnt.textContent=pad(Math.floor(diff/3600))+':'+pad(Math.floor(diff%3600/60))+':'+pad(diff%60);
    }
    if(lbl) lbl.textContent = (mode==='iftar')?'İftara':'Sahura';
    if(ico) ico.className = (mode==='iftar')?'fa-solid fa-utensils':'fa-solid fa-moon';
  }
  if(cnt){ tick(); setInterval(tick, demo?250:1000); }
})();
</script>
